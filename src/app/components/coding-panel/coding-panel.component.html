<div class="right-panel" [class.fullscreen]="isFullscreen">
  <div class="tab-bar">
    <div class="tabs-scroll">
      <div *ngFor="let tab of tabs" 
           class="tab-btn" 
           [class.active]="activeTab === tab.id"
           (click)="selectTab(tab.id)">
        {{tab.label}}
        <span class="tab-count" *ngIf="tab.count > 0">{{tab.count}}</span>
      </div>
    </div>
    <div class="tab-actions">
       <button class="btn" (click)="toggleFullscreen()">{{isFullscreen ? '⤦ Normal' : '⛶ Full'}}</button>
    </div>
  </div>

  <div class="dos-tabs">
    <div *ngFor="let dos of dosList" 
         class="dos-tab" 
         [class.active]="selectedDos === dos" 
         (click)="selectedDos = dos">
      {{dos}}
    </div>
    <div class="dos-tab add-dos" (click)="addDos()">+ DOS</div>
  </div>

  <div class="coding-content">
    <app-coding-tab-content 
      [tabId]="activeTab"
      [isFullscreen]="isFullscreen">
    </app-coding-tab-content>
  </div>

  <div class="panel-footer">
    <button class="footer-btn submit">Submit</button>
    <button class="footer-btn">On Hold</button>
    <button class="footer-btn">Discard</button>
    <button class="footer-btn">Suspend</button>
    <button class="footer-btn">Notes</button>
  </div>
</div>
